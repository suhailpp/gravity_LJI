<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aurelia Skylines — Loyalty App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300&family=Fredoka:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090E;
    --surface: #0C0F16;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --border-gold: rgba(201,148,42,0.25);
    --gold: #C9942A;
    --gold-dim: rgba(201,148,42,0.6);
    --text-1: #F0EDE8;
    --text-2: rgba(240,237,232,0.5);
    --text-3: rgba(240,237,232,0.25);
    --purple: rgba(88,28,255,0.12);
    --purple-border: rgba(139,92,246,0.2);
  }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0f;
    color: var(--text-1);
    font-family: 'Fredoka', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,148,42,0.06), transparent 50%),
      #0a0a0f;
  }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }

  /* Force light weight on every Source Serif title */
  [style*="Source Serif"] { font-weight: 300 !important; }

  /* keyframes */
  @keyframes flyPlane {
    0%   { transform: translateX(-8%); }
    100% { transform: translateX(108%); }
  }
  @keyframes fadeRise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fillBar {
    from { transform: scaleX(0); }
    to   { transform: scaleX(var(--p, 1)); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.9; }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes pulseGold {
    0%, 100% { box-shadow: 0 0 0 4px rgba(201,148,42,0.18); }
    50%      { box-shadow: 0 0 0 9px rgba(201,148,42,0.05); }
  }
  @keyframes checkDraw {
    from { stroke-dashoffset: 20; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes checkPop {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes confettiBurst {
    0%   { opacity: 0; transform: translate(0,0) rotate(0deg); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx,0), var(--ty,0)) rotate(var(--rot,180deg)); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes revealUp {
    from { opacity: 0; transform: translateY(100%); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowBreathe {
    0%, 100% { opacity: 0.75; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.05); }
  }
  @keyframes screenFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes sectionFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* press / hover utilities */
  .press { transition: transform 150ms cubic-bezier(.2,.7,.2,1), filter 150ms ease; }
  .press:active { transform: scale(0.96); filter: brightness(1.04); }
  .press-card { transition: transform 220ms cubic-bezier(.2,.7,.2,1), box-shadow 220ms ease, border-color 220ms ease; }
  .press-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.4); border-color: rgba(201,148,42,0.25); }
  .press-card:active { transform: translateY(0) scale(0.99); }
  .press-row { transition: background-color 180ms ease; }
  .press-row:hover { background-color: rgba(255,255,255,0.02); }

  .fade-rise   { animation: fadeRise 420ms cubic-bezier(.2,.7,.2,1) both; }
  .screen-fade { animation: screenFade 320ms cubic-bezier(.2,.7,.2,1) both; }
  .section-fade { animation: sectionFade 380ms cubic-bezier(.2,.7,.2,1) both; }
  .pulse-gold  { animation: pulseGold 2.4s ease-in-out infinite; }
  .glow-breathe { animation: glowBreathe 6s ease-in-out infinite; }

  /* smooth all inline transitions */
  button, a, [role="button"] {
    transition: color 180ms ease, background-color 180ms ease, border-color 180ms ease, opacity 180ms ease;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie_light.min.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="offers-screen.jsx"></script>
  <script type="text/babel" src="detail-screen.jsx"></script>
  <script type="text/babel" src="loyalty-screen.jsx"></script>
  <script type="text/babel" src="profile-screen.jsx"></script>
  <script type="text/babel" src="redeem-screen.jsx"></script>
  <script type="text/babel" src="redeem-inline.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
