<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Loyalty Platform — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --paper:#f3eddc;
    --paper-2:#ede5cf;
    --ink:#1a1a1a;
    --ink-soft:#3d3a35;
    --ink-mute:#7d7a72;
    --rule:#1a1a1a;
    --gold:#e8b53b;
    --gold-soft:#f6dc8a;
    --red:#c8493d;
    --green:#3f8a5a;
    --blue:#3c6ea8;
    --amber:#cf8a2a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Patrick Hand', cursive;}
  body{
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 22px 22px;
    min-height:100vh;
  }
  .h-display{font-family:'Caveat', cursive; font-weight:700;}
  .h-hand{font-family:'Kalam', cursive;}
  .mono{font-family:'JetBrains Mono', monospace;}

  /* Sketchy box — uses SVG filter for roughness */
  .sk{
    border:2px solid var(--ink);
    background:var(--paper);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    filter:url(#rough);
  }
  .sk-dash{
    border:2px dashed var(--ink);
    background:transparent;
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
  }
  .sk-fill{
    background:var(--ink);
    color:var(--paper);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    filter:url(#rough);
  }
  .sk-gold{
    background:var(--gold);
    color:var(--ink);
    border:2px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    filter:url(#rough);
  }
  .sk-soft{
    background:var(--paper-2);
    border:2px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    filter:url(#rough);
  }
  .sk-thin{
    border:1.5px solid var(--ink);
    border-radius:5px 3px 6px 4px / 4px 6px 3px 5px;
  }
  .hl-gold{ background: linear-gradient(180deg, transparent 55%, var(--gold-soft) 55%);}
  .strike{position:relative}
  .strike::after{content:''; position:absolute; left:-2px; right:-2px; top:50%; height:2px; background:var(--ink); transform:rotate(-2deg)}
  .hand-arrow::after{content:" →"; font-family:'Caveat',cursive; font-weight:700;}
  .dot{display:inline-block; width:10px; height:10px; border-radius:50%; border:1.5px solid var(--ink); vertical-align:middle; margin-right:6px;}
  .dot.green{background:var(--green)}
  .dot.red{background:var(--red)}
  .dot.amber{background:var(--amber)}
  .dot.blue{background:var(--blue)}
  .dot.gray{background:#9a978f}
  .dot.gold{background:var(--gold)}
  .dot.empty{background:transparent}

  .scribble-underline{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 8'><path d='M2 5 Q 30 1, 60 5 T 120 5 T 198 4' stroke='%231a1a1a' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-size:100% 7px;
    background-position:0 100%;
    padding-bottom:6px;
  }

  /* Tab bar */
  .tabs{
    position:sticky; top:0; z-index:30;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    padding:14px 28px 10px;
    display:flex; align-items:center; gap:14px;
    box-shadow: 0 2px 0 0 rgba(0,0,0,0.04);
  }
  .tab-btn{
    font-family:'Kalam',cursive; font-weight:700; font-size:18px;
    padding:8px 14px;
    cursor:pointer;
    background:transparent;
    border:2px solid transparent;
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    color:var(--ink-soft);
  }
  .tab-btn:hover{background:rgba(0,0,0,0.05)}
  .tab-btn.active{
    background:var(--ink); color:var(--paper);
    filter:url(#rough);
  }
  .tab-num{font-family:'Caveat',cursive; font-weight:700; font-size:22px; margin-right:6px; opacity:.8}

  /* Screen frame */
  .screen{
    max-width:1440px; margin:0 auto; padding:22px 28px 80px;
  }
  .frame{
    position:relative;
    border:2.5px solid var(--ink);
    background:var(--paper);
    border-radius:14px 10px 16px 12px / 12px 14px 10px 16px;
    filter:url(#rough);
    padding:0;
    overflow:hidden;
  }

  /* Sidebar rail */
  .rail{
    width:64px;
    border-right:2px solid var(--ink);
    padding:12px 0;
    display:flex; flex-direction:column; align-items:center; gap:14px;
    background:var(--paper-2);
  }
  .rail-icon{
    width:42px; height:42px;
    border:1.5px solid var(--ink);
    border-radius:8px 6px 10px 7px / 7px 9px 6px 8px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Caveat',cursive; font-weight:700; font-size:14px;
    background:var(--paper);
    cursor:pointer;
  }
  .rail-icon.active{ background:var(--gold); }

  .topbar{
    border-bottom:2px solid var(--ink);
    padding:10px 18px;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--paper);
    min-height:48px;
  }
  .crumb{ color:var(--ink-mute); font-size:16px; }
  .crumb b{ color:var(--ink); }
  .avatar{
    width:34px; height:34px; border-radius:50%; border:1.5px solid var(--ink);
    background:var(--paper-2);
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Kalam',cursive; font-weight:700; font-size:14px;
  }
  .bell{
    position:relative; width:28px; height:28px;
    border:1.5px solid var(--ink);
    border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--paper-2);
    font-family:'Caveat',cursive; font-weight:700; font-size:16px;
  }
  .bell .b-badge{
    position:absolute; top:-6px; right:-6px;
    background:var(--red); color:var(--paper);
    width:18px; height:18px; border-radius:50%;
    font-size:11px; border:1.5px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
  }

  .layout-row{ display:flex; min-height:760px; }
  .content{ flex:1; padding:22px 26px 32px; overflow:auto;}

  /* Tags + pills */
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 10px;
    border:1.5px solid var(--ink);
    border-radius:999px;
    font-size:14px;
    background:var(--paper);
    font-family:'Kalam',cursive;
    line-height:1.4;
  }
  .pill.gold{ background:var(--gold); }
  .pill.amber{ background:#f3c878; }
  .pill.red{ background:#ec9d96; }
  .pill.green{ background:#a3d4b3; }
  .pill.blue{ background:#a8c4e3; }
  .pill.dark{ background:var(--ink); color:var(--paper); }
  .pill.ghost{ background:transparent; }

  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px;
    border:2px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    font-family:'Kalam',cursive; font-weight:700; font-size:15px;
    background:var(--paper); color:var(--ink);
    cursor:pointer; user-select:none;
    filter:url(#rough);
  }
  .btn:hover{ background:var(--paper-2); }
  .btn.primary{ background:var(--gold); }
  .btn.dark{ background:var(--ink); color:var(--paper); }
  .btn.ghost{ background:transparent; border-style:dashed; }
  .btn.sm{ padding:3px 10px; font-size:13px; font-weight:400; font-family:'Patrick Hand',cursive; }

  /* Card grid helpers */
  .grid{ display:grid; gap:14px; }
  .g-4{ grid-template-columns:repeat(4, 1fr); }
  .g-3{ grid-template-columns:repeat(3, 1fr); }
  .g-2{ grid-template-columns:repeat(2, 1fr); }

  .insight-card{
    padding:12px 14px;
    background:var(--paper);
    border:1.5px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    border-left-width:8px;
    position:relative;
  }
  .insight-card.red{ border-left-color:var(--red); }
  .insight-card.green{ border-left-color:var(--green); }
  .insight-card.amber{ border-left-color:var(--amber); }
  .insight-card.blue{ border-left-color:var(--blue); }
  .insight-card h4{ margin:6px 0 4px; font-family:'Kalam',cursive; font-weight:700; font-size:16px; line-height:1.25; }
  .insight-card p{ margin:0 0 10px; color:var(--ink-soft); font-size:14px; line-height:1.35; }

  .icon-circle{
    width:28px; height:28px; border-radius:50%;
    border:1.5px solid var(--ink);
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--paper-2);
    font-family:'Caveat',cursive; font-weight:700; font-size:14px;
  }
  .ic-red{background:#ec9d96}
  .ic-green{background:#a3d4b3}
  .ic-amber{background:#f3c878}
  .ic-blue{background:#a8c4e3}

  .metric{
    padding:10px 12px;
    border:1.5px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    background:var(--paper);
  }
  .metric .lbl{ font-family:'Kalam',cursive; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-mute); }
  .metric .val{ font-family:'Caveat',cursive; font-weight:700; font-size:30px; line-height:1; margin:4px 0 4px; }
  .metric .chg{ font-size:13px; }
  .chg.up{ color:var(--green); }
  .chg.down{ color:var(--red); }
  .chg.warn{ color:var(--amber); }

  .stack-bar{
    height:30px; border:1.5px solid var(--ink); border-radius:4px; overflow:hidden; display:flex;
  }
  .stack-bar > div{ display:flex; align-items:center; justify-content:center; font-family:'Kalam',cursive; font-weight:700; font-size:13px;}
  .seg-silver{ background:#cdcabe; }
  .seg-gold{ background:var(--gold); }
  .seg-plat{ background:#eee8d2; border-left:1.5px solid var(--ink); }

  .heat{ display:grid; gap:3px; grid-template-columns:repeat(7,1fr); }
  .heat-row{ display:contents; }
  .heat-cell{ height:18px; border:1px solid var(--ink); border-radius:2px;}

  .camp-card{
    padding:12px 14px;
    background:var(--paper);
    border:1.5px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
  }
  .camp-card:hover{ background:var(--paper-2); }
  .logo-sq{
    width:36px; height:36px;
    border:1.5px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Caveat',cursive; font-weight:700; font-size:15px;
    background:var(--paper-2);
  }
  .progress{
    height:10px; border:1.5px solid var(--ink); border-radius:6px; overflow:hidden; background:var(--paper);
  }
  .progress > div{ height:100%; background:var(--ink); }
  .progress.green > div{ background:var(--green); }
  .progress.amber > div{ background:var(--amber); }
  .progress.red > div{ background:var(--red); }

  /* Table */
  .ot-row{
    display:grid;
    grid-template-columns: 110px 1.4fr 110px 1.4fr 130px 90px 130px 70px 130px 150px;
    gap:8px;
    padding:10px 12px;
    border-bottom:1.5px dashed var(--ink);
    align-items:center;
    cursor:pointer;
    font-size:14px;
  }
  .ot-row:hover{ background:var(--paper-2); border-left:3px solid var(--gold); padding-left:9px;}
  .ot-row.head{
    background:var(--ink); color:var(--paper); border-bottom:2px solid var(--ink); cursor:default;
    font-family:'Kalam',cursive; font-weight:700; text-transform:uppercase; font-size:12px; letter-spacing:.06em;
  }
  .ot-row.head:hover{ background:var(--ink); border-left:none; padding-left:12px;}

  /* Drawer */
  .drawer{
    position:absolute; top:0; right:0; height:100%;
    width:400px; background:var(--paper);
    border-left:2px solid var(--ink);
    transform:translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    overflow:auto;
    box-shadow:-6px 0 0 rgba(0,0,0,0.05);
  }
  .drawer.open{ transform:translateX(0); }
  .drawer-hd{
    padding:14px 16px; border-bottom:2px solid var(--ink); display:flex; align-items:start; gap:10px;
    background:var(--paper-2);
  }
  .drawer-close{
    margin-left:auto;
    width:30px; height:30px; border:1.5px solid var(--ink); border-radius:50%;
    background:var(--paper); cursor:pointer;
    font-family:'Caveat',cursive; font-weight:700;
  }
  .drawer-body{ padding:14px 16px; display:flex; flex-direction:column; gap:14px;}
  .drawer-section h5{
    margin:0 0 6px; font-family:'Kalam',cursive; font-weight:700; font-size:13px;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-mute);
  }

  /* Templates */
  .path-card{
    padding:22px;
    border:2px solid var(--ink);
    border-radius:8px 6px 10px 7px / 7px 9px 6px 8px;
    background:var(--paper);
    min-height:230px;
    display:flex; flex-direction:column;
  }
  .path-card.gold-edge{ border-left:8px solid var(--gold); background:var(--paper); }
  .ai-banner{
    padding:10px 14px;
    border:2px dashed var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    background:#faecc4;
    display:flex; align-items:center; gap:10px;
  }
  .tpl-card{
    padding:14px 16px;
    border:1.5px solid var(--ink);
    border-radius:6px 4px 8px 5px / 5px 7px 4px 6px;
    background:var(--paper);
    position:relative;
    display:flex; flex-direction:column; gap:8px;
  }
  .tpl-rec-badge{
    position:absolute; top:-10px; right:10px;
    padding:3px 10px; background:var(--gold);
    border:1.5px solid var(--ink);
    border-radius:999px;
    font-family:'Kalam',cursive; font-weight:700; font-size:12px;
  }

  /* Step indicator */
  .steps{
    display:flex; align-items:stretch; gap:0;
    border:1.5px solid var(--ink);
    border-radius:6px;
    overflow:hidden;
    background:var(--paper-2);
  }
  .step{
    flex:1; padding:10px 12px; cursor:pointer;
    border-right:1.5px dashed var(--ink);
    display:flex; flex-direction:column; gap:2px;
    background:var(--paper-2);
  }
  .step:last-child{ border-right:none; }
  .step.active{ background:var(--paper); position:relative; }
  .step.active::after{
    content:''; position:absolute; left:8px; right:8px; bottom:0; height:4px; background:var(--gold);
    border-top:1.5px solid var(--ink);
  }
  .step .s-num{ font-family:'Caveat',cursive; font-weight:700; font-size:18px; }
  .step .s-name{ font-family:'Kalam',cursive; font-weight:700; font-size:13px;}
  .step .s-frac{ font-size:12px; color:var(--ink-mute);}

  /* Form */
  .field{ display:flex; flex-direction:column; gap:5px; margin-bottom:14px;}
  .field-label{ font-family:'Kalam',cursive; font-weight:700; font-size:13px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; justify-content:space-between;}
  .input{
    border:1.5px solid var(--ink);
    background:var(--paper);
    padding:8px 10px;
    border-radius:5px 3px 6px 4px / 4px 6px 3px 5px;
    font-family:'Patrick Hand',cursive;
    font-size:15px;
    min-height:36px;
  }
  .input.mono{ font-family:'JetBrains Mono',monospace; font-size:13px; }
  .input.textarea{ min-height:72px;}
  .input.select::after{ content:" ▾"; float:right; }

  .toggle{
    display:inline-flex; align-items:center; gap:8px;
    cursor:pointer; font-family:'Kalam',cursive;
  }
  .toggle .knob{
    width:36px; height:20px; border:1.5px solid var(--ink); border-radius:999px;
    position:relative; background:var(--paper-2);
  }
  .toggle .knob::after{
    content:''; position:absolute; top:1px; left:1px; width:14px; height:14px; border-radius:50%;
    background:var(--ink); transition: all .18s;
  }
  .toggle.on .knob{ background:var(--gold); }
  .toggle.on .knob::after{ left:18px; }

  /* Mobile preview */
  .phone{
    width:280px; margin:10px auto;
    border:2.5px solid var(--ink);
    border-radius:32px;
    padding:14px 10px 18px;
    background:var(--paper);
    position:relative;
  }
  .phone::before{
    content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:60px; height:6px; background:var(--ink); border-radius:6px;
  }
  .phone-screen{
    border:1.5px solid var(--ink); border-radius:18px;
    padding:10px;
    background:var(--paper-2);
    min-height:460px;
    display:flex; flex-direction:column; gap:8px;
  }
  .banner-ph{
    height:90px; border:1.5px dashed var(--ink); border-radius:8px;
    background: repeating-linear-gradient(45deg, #f6dc8a, #f6dc8a 8px, var(--gold) 8px, var(--gold) 16px);
    display:flex; align-items:center; justify-content:center;
    font-family:'Kalam',cursive; font-weight:700; font-size:13px;
    color:var(--ink);
  }

  /* Confirmation */
  .ring-wrap{
    width:90px; height:90px; position:relative; margin: 8px auto 16px;
  }
  .ring-wrap .ring{
    position:absolute; inset:0; border:2px solid var(--ink); border-radius:50%;
    animation: ringExp .6s cubic-bezier(.2,.6,.4,1) both;
  }
  .ring-wrap .ring2{
    position:absolute; inset:0; border:2px dashed var(--gold); border-radius:50%;
    animation: ringExp .8s .15s cubic-bezier(.2,.6,.4,1) both;
  }
  .ring-wrap .check{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Caveat',cursive; font-weight:700; font-size:46px; color:var(--green);
  }
  @keyframes ringExp{
    from{ transform:scale(.4); opacity:0;}
    to{ transform:scale(1); opacity:1;}
  }
  .timeline{ position:relative; padding-left:24px;}
  .timeline::before{ content:''; position:absolute; left:8px; top:6px; bottom:6px; border-left:2px dashed var(--ink); }
  .tl-node{ position:relative; margin-bottom:14px;}
  .tl-node::before{
    content:''; position:absolute; left:-22px; top:4px; width:14px; height:14px; border-radius:50%;
    border:1.5px solid var(--ink); background:var(--paper);
  }
  .tl-node.done::before{ background:var(--green); }
  .tl-node.now::before{ background:var(--gold); }
  .tl-node.pend::before{ background:var(--amber); }

  /* Wireframe annotation marker */
  .wf-note{
    position:absolute;
    font-family:'Caveat',cursive; font-weight:700;
    color:var(--red);
    font-size:18px;
    transform:rotate(-3deg);
    pointer-events:none;
  }
  .wf-note .arrow{ font-size:22px; }

  .col-flex{display:flex; flex-direction:column;}
  .row{display:flex; align-items:center; gap:10px;}
  .row.between{ justify-content:space-between;}
  .row.wrap{ flex-wrap:wrap; }
  .gap-4{ gap:4px; } .gap-6{ gap:6px;} .gap-8{ gap:8px;} .gap-12{ gap:12px;} .gap-16{ gap:16px;} .gap-20{ gap:20px;}
  .mt-2{margin-top:2px} .mt-4{margin-top:4px} .mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px} .mt-20{margin-top:20px} .mt-24{margin-top:24px}
  .mb-2{margin-bottom:2px} .mb-4{margin-bottom:4px} .mb-8{margin-bottom:8px} .mb-12{margin-bottom:12px} .mb-16{margin-bottom:16px}
  .p-12{padding:12px} .p-16{padding:16px}
  .text-mute{ color:var(--ink-mute); }
  .text-soft{ color:var(--ink-soft); }
  .text-sm{ font-size:13px; }
  .text-md{ font-size:15px; }
  .text-lg{ font-size:18px; }
  .text-xl{ font-size:22px; }
  .text-c{ text-align:center; }

  /* Wireframe legend */
  .legend{
    position:fixed; bottom:14px; right:14px; z-index:40;
    background:var(--paper); border:1.5px solid var(--ink);
    border-radius:6px;
    padding:8px 12px;
    font-family:'Kalam',cursive; font-size:13px;
    box-shadow:3px 3px 0 rgba(0,0,0,.08);
    max-width:260px;
  }
  .legend b{ font-family:'Caveat',cursive; font-size:18px; display:block; margin-bottom:2px;}
</style>
</head>
<body>

<!-- SVG roughen filter for hand-drawn vibe -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="3" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="1.6"/>
    </filter>
  </defs>
</svg>

<div id="root"></div>

<div class="legend">
  <b>Wireframe set</b>
  Low-fi marker sketches of the 5-screen flow.<br/>
